services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-learning-backend
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
